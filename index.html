<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icons of the Game · 2000–2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  /* ── TOKENS ─────────────────────────────── */
  :root {
    --gold:       #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim:   #8B6E2A;
    --white:      #FFFFFF;
    --off-white:  #F7F3EC;
    --ink:        #0A0A0A;
    --ink-mid:    #1A1A1A;
    --ink-soft:   #2C2C2C;
    --mist:       #E8E2D6;
    --card-bg:    #FAFAF7;
    --no-img-bg:  #1A1A1A;

    --pos-gk:  #1A4A6B;
    --pos-def: #1B5E20;
    --pos-mid: #4A3000;
    --pos-fwd: #7B0D0D;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--off-white);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────── */
  header {
    background: var(--ink);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--gold);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .site-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 3px;
    white-space: nowrap;
  }

  .site-title span {
    color: rgba(201,168,76,0.45);
    font-size: 14px;
    letter-spacing: 2px;
    margin-left: 10px;
    vertical-align: middle;
  }

  /* ── SEARCH + FILTERS ───────────────────── */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    max-width: 680px;
  }

  .search-wrap {
    position: relative;
    flex: 1;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold-dim);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--white);
    padding: 9px 14px 9px 40px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }

  #search::placeholder { color: rgba(255,255,255,0.3); }
  #search:focus { border-color: var(--gold); }

  .filter-group {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: rgba(255,255,255,0.5);
    padding: 7px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }

  .filter-btn:hover,
  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--ink);
  }

  .count-badge {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: rgba(201,168,76,0.5);
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }

  /* ── HERO ───────────────────────────────── */
  .hero {
    background: var(--ink);
    padding: 72px 32px 60px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 100%, rgba(201,168,76,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-eyebrow {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 5px;
    color: var(--gold-dim);
    margin-bottom: 16px;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(48px, 7vw, 88px);
    font-weight: 900;
    color: var(--white);
    line-height: 1;
    margin-bottom: 8px;
  }

  .hero-title .gold { color: var(--gold); }

  .hero-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.4);
    font-weight: 300;
    letter-spacing: 1px;
    margin-top: 16px;
  }

  .hero-rule {
    width: 60px;
    height: 2px;
    background: var(--gold);
    margin: 24px auto 0;
  }

  /* ── GRID ───────────────────────────────── */
  .grid-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 24px;
  }

  /* ── PLAYER CARD ────────────────────────── */
  .player-card {
    background: var(--white);
    border: 1px solid var(--mist);
    cursor: pointer;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s;
    position: relative;
    overflow: hidden;
  }

  .player-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 48px rgba(0,0,0,0.12), 0 0 0 1px var(--gold);
    border-color: var(--gold);
  }

  /* position stripe at top */
  .card-stripe {
    height: 3px;
    width: 100%;
  }

  .stripe-GK  { background: var(--pos-gk); }
  .stripe-DEF { background: var(--pos-def); }
  .stripe-MID { background: var(--pos-mid); }
  .stripe-FWD { background: var(--pos-fwd); }

  .card-img-wrap {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--no-img-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* placeholder when no image */
  .card-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 100%;
    background: linear-gradient(160deg, #141414 0%, #1e1e1e 100%);
  }

  .placeholder-initials {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: rgba(201,168,76,0.2);
    line-height: 1;
    letter-spacing: 2px;
  }

  .placeholder-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(201,168,76,0.2);
    text-transform: uppercase;
  }

  .card-body {
    padding: 14px 14px 16px;
    border-top: 1px solid var(--mist);
  }

  .card-pos-badge {
    display: inline-block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 2px 7px;
    margin-bottom: 6px;
    color: var(--white);
  }

  .badge-GK  { background: var(--pos-gk); }
  .badge-DEF { background: var(--pos-def); }
  .badge-MID { background: var(--pos-mid); }
  .badge-FWD { background: var(--pos-fwd); }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .card-nat {
    font-size: 11px;
    color: #888;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .card-peak {
    margin-top: 8px;
    font-size: 11px;
    color: var(--gold-dim);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* hidden cards */
  .player-card.hidden { display: none; }

  /* ── DETAIL MODAL ───────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--white);
    max-width: 780px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    display: grid;
    grid-template-columns: 280px 1fr;
    position: relative;
    transform: translateY(16px);
    transition: transform .25s ease;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-img-col {
    background: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    position: relative;
    min-height: 380px;
  }

  .modal-img-col img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .modal-no-img {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(160deg, #111 0%, #1e1e1e 100%);
    padding: 40px;
    min-height: 380px;
  }

  .modal-no-img .big-initial {
    font-family: 'Playfair Display', serif;
    font-size: 96px;
    font-weight: 900;
    color: rgba(201,168,76,0.15);
    line-height: 1;
  }

  .modal-no-img .coming-soon {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(201,168,76,0.3);
    text-transform: uppercase;
  }

  .modal-content-col {
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
  }

  .modal-pos-badge {
    display: inline-block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 3px 10px;
    color: var(--white);
    margin-bottom: 12px;
    align-self: flex-start;
  }

  .modal-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 4vw, 34px);
    font-weight: 900;
    color: var(--ink);
    line-height: 1.1;
    margin-bottom: 4px;
  }

  .modal-nat {
    font-size: 13px;
    color: #888;
    font-weight: 500;
    letter-spacing: 1px;
    margin-bottom: 28px;
  }

  .modal-rule {
    width: 40px;
    height: 2px;
    background: var(--gold);
    margin-bottom: 28px;
  }

  .modal-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .stat-item {}

  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: #AAA;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 600;
  }

  .stat-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
  }

  .stat-value.gold { color: var(--gold-dim); }

  .modal-notes {
    border-top: 1px solid var(--mist);
    padding-top: 20px;
    margin-top: auto;
  }

  .notes-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: #AAA;
    text-transform: uppercase;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .notes-text {
    font-size: 14px;
    line-height: 1.65;
    color: #555;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--white);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    z-index: 10;
    transition: background .15s;
  }

  .modal-close:hover { background: rgba(255,255,255,0.2); }

  /* ── EMPTY STATE ────────────────────────── */
  .empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 32px;
    text-align: center;
    color: #AAA;
    gap: 12px;
  }

  .empty-state.show { display: flex; }

  .empty-icon {
    font-size: 48px;
    opacity: .3;
  }

  .empty-text {
    font-size: 15px;
    color: #AAA;
  }

  /* ── NO IMAGE STRIP ─────────────────────── */
  .modal-gold-stripe {
    height: 4px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-dim));
  }

  /* ── SCROLLBAR ──────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--off-white); }
  ::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 3px; }

  /* ── RESPONSIVE ─────────────────────────── */
  @media (max-width: 640px) {
    .hero { padding: 48px 20px 40px; }
    .grid-wrap { padding: 24px 16px 60px; }
    .player-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; }
    .controls { flex-wrap: wrap; }
    .filter-group { flex-wrap: wrap; }
    .modal { grid-template-columns: 1fr; }
    .modal-img-col { min-height: 260px; }
    .header-inner { padding: 0 16px; }
  }
</style>
</head>

      <div class="modal-notes">
        <div class="notes-label">Career Highlights</div>
        <p class="notes-text" id="modal-notes"></p>
      </div>
    </div>
  </div>
</div>

// ── Position grouping
function posGroup(pos) {
  if (!pos) return 'MID';
  const p = pos.toUpperCase();
  if (p === 'GK') return 'GK';
  if (['RB','LB','CB','CB1','CB2','DEF'].includes(p)) return 'DEF';
  if (['DM','CM','AM','RM','LM'].includes(p)) return 'MID';
  if (['RW','LW','ST','FW','FWD','SS'].includes(p)) return 'FWD';
  return 'MID';
}

function posLabel(pos) {
  const map = {
    'GK':'Goalkeeper','RB':'Right Back','LB':'Left Back','CB':'Centre Back',
    'DM':'Defensive Mid','CM':'Central Mid','AM':'Attacking Mid',
    'RM':'Right Mid','LM':'Left Mid','RW':'Right Wing','LW':'Left Wing',
    'ST':'Striker','FW':'Forward','SS':'Second Striker'
  };
  return map[pos] || pos;
}

function initials(name) {
  return name.split(' ').map(w => w[0]).filter(Boolean).slice(0,2).join('');
}

// ── Build grid
const grid = document.getElementById('player-grid');
const empty = document.getElementById('empty-state');
const countBadge = document.getElementById('count-badge');

PLAYERS.forEach((p, i) => {
  const group = posGroup(p.position);
  const card = document.createElement('div');
  card.className = 'player-card';
  card.dataset.name = (p.name || '').toLowerCase();
  card.dataset.nat = (p.nationality || '').toLowerCase();
  card.dataset.pos = group;
  card.dataset.index = i;

  const imgHtml = p.image_file
    ? `<img src="images/${p.image_file}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-placeholder\\'><div class=\\'placeholder-initials\\'>${initials(p.name)}</div><div class=\\'placeholder-label\\'>Card Coming Soon</div></div>'">`
    : `<div class="card-placeholder">
         <div class="placeholder-initials">${initials(p.name)}</div>
         <div class="placeholder-label">Card Coming Soon</div>
       </div>`;

  card.innerHTML = `
    <div class="card-stripe stripe-${group}"></div>
    <div class="card-img-wrap">${imgHtml}</div>
    <div class="card-body">
      <span class="card-pos-badge badge-${group}">${p.position || ''}</span>
      <div class="card-name">${p.name}</div>
      <div class="card-nat">${p.nationality || ''}</div>
      <div class="card-peak">${p.peak_years || ''}</div>
    </div>`;

  card.addEventListener('click', () => openModal(i));
  grid.appendChild(card);
});

// ── Filter + Search
let activePos = 'ALL';
let searchTerm = '';

function applyFilters() {
  const cards = document.querySelectorAll('.player-card');
  let visible = 0;
  cards.forEach(card => {
    const nameMatch = !searchTerm || card.dataset.name.includes(searchTerm) || card.dataset.nat.includes(searchTerm);
    const posMatch  = activePos === 'ALL' || card.dataset.pos === activePos;
    const show = nameMatch && posMatch;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  empty.classList.toggle('show', visible === 0);
  countBadge.textContent = `${visible} player${visible !== 1 ? 's' : ''}`;
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  applyFilters();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activePos = btn.dataset.pos;
    applyFilters();
  });
});

// ── Modal
const overlay = document.getElementById('modal-overlay');
const posColors = { GK:'var(--pos-gk)', DEF:'var(--pos-def)', MID:'var(--pos-mid)', FWD:'var(--pos-fwd)' };

function openModal(i) {
  const p = PLAYERS[i];
  const group = posGroup(p.position);

  // Image col
  const imgCol = document.getElementById('modal-img-col');
  if (p.image_file) {
    imgCol.innerHTML = `
      <div class="modal-gold-stripe"></div>
      <img src="images/${p.image_file}" alt="${p.name}" style="flex:1;width:100%;object-fit:cover;display:block;">`;
    imgCol.style.background = 'var(--ink)';
  } else {
    imgCol.innerHTML = `
      <div class="modal-gold-stripe"></div>
      <div class="modal-no-img">
        <div class="big-initial">${initials(p.name)}</div>
        <div class="coming-soon">Card coming soon</div>
      </div>`;
  }

  // Content
  const badge = document.getElementById('modal-badge');
  badge.textContent = posLabel(p.position);
  badge.style.background = posColors[group] || posColors.MID;

  document.getElementById('modal-name').textContent = p.name;
  document.getElementById('modal-nat').textContent = p.nationality;
  document.getElementById('modal-nat2').textContent = p.nationality;
  document.getElementById('modal-peak').textContent = p.peak_years || '—';
  document.getElementById('modal-club').textContent = p.best_club || '—';
  document.getElementById('modal-pos').textContent = posLabel(p.position);
  document.getElementById('modal-notes').textContent = p.notes || '—';

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
