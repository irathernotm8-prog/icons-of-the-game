<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-dim:#8B6E2A;--gold-pale:#F5EDD6;
  --white:#FFFFFF;--off-white:#F4F0E8;--ink:#0A0A0A;--ink-soft:#2C2C2C;--mist:#E2DAC8;
  --pos-gk:#1A4A6B;--pos-def:#1B5E20;--pos-mid:#5C3D00;--pos-fwd:#7B0D0D;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--off-white);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh}

/* ── HEADER ── */
header{background:var(--ink);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100}
.header-inner{max-width:1440px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;gap:20px}
.site-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold);white-space:nowrap;flex-shrink:0}
.controls{display:flex;align-items:center;gap:10px;flex:1}
.search-wrap{position:relative;flex:1;max-width:360px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(201,168,76,.4);pointer-events:none;width:15px;height:15px}
#search{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.25);color:#fff;padding:8px 12px 8px 36px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
#search::placeholder{color:rgba(255,255,255,.25)}
#search:focus{border-color:var(--gold)}
.filter-group{display:flex;gap:4px}
.filter-btn{background:transparent;border:1px solid rgba(201,168,76,.2);color:rgba(255,255,255,.4);padding:6px 13px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:rgba(201,168,76,.5);color:rgba(255,255,255,.7)}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink)}
.sort-group{display:flex;gap:4px;margin-left:4px;border-left:1px solid rgba(201,168,76,.15);padding-left:12px}
.sort-btn{background:transparent;border:1px solid rgba(201,168,76,.15);color:rgba(255,255,255,.3);padding:6px 10px;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .15s}
.sort-btn:hover{border-color:rgba(201,168,76,.4);color:rgba(255,255,255,.6)}
.sort-btn.active{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.4);color:var(--gold)}
.count-label{font-size:11px;color:rgba(201,168,76,.4);margin-left:auto;white-space:nowrap;font-weight:500;letter-spacing:1px}

/* ── HERO ── */
.hero{background:var(--ink);padding:80px 32px 72px;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to bottom,transparent,var(--off-white))}
.hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse 55% 40% at 50% 100%,rgba(201,168,76,.1) 0%,transparent 70%);pointer-events:none}
.hero-eyebrow{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:6px;color:var(--gold-dim);margin-bottom:20px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(52px,8vw,96px);font-weight:900;color:var(--white);line-height:.95}
.hero-title .gold{color:var(--gold);font-style:italic}
.hero-sub{font-size:13px;color:rgba(255,255,255,.3);letter-spacing:2px;margin-top:20px;font-weight:300;text-transform:uppercase}
.hero-divider{width:48px;height:2px;background:var(--gold);margin:24px auto 0;opacity:.7}

/* ── GRID ── */
.grid-wrap{max-width:1440px;margin:0 auto;padding:48px 32px 100px}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:20px}

/* ── PLAYER CARD ── */
.player-card{background:var(--white);border:1px solid var(--mist);cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;overflow:hidden;display:flex;flex-direction:column}
.player-card:hover{transform:translateY(-5px);box-shadow:0 24px 56px rgba(0,0,0,.1),0 0 0 1px var(--gold);border-color:var(--gold)}
.card-stripe{height:3px;flex-shrink:0}
.stripe-GK{background:var(--pos-gk)}.stripe-DEF{background:var(--pos-def)}.stripe-MID{background:var(--pos-mid)}.stripe-FWD{background:var(--pos-fwd)}

/* White background — transparent PNGs show cleanly */
.card-img-wrap{width:100%;aspect-ratio:3/4;background:var(--white);overflow:hidden;display:flex;align-items:flex-end;justify-content:center}
.card-img-wrap img{width:100%;height:100%;object-fit:contain;object-position:bottom center;display:block}

/* Placeholder: gold tone, initials only — no text */
.card-placeholder{width:100%;height:100%;background:linear-gradient(160deg,var(--gold-pale) 0%,#ede5d0 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.ph-initials{font-family:'Playfair Display',serif;font-size:56px;font-weight:900;color:rgba(139,110,42,.22);line-height:1;letter-spacing:-2px}
.ph-pos{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(139,110,42,.35)}

.card-body{padding:12px 14px 15px;border-top:1px solid var(--mist);flex:1;display:flex;flex-direction:column;gap:4px}
.card-pos-badge{display:inline-flex;align-items:center;font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:2px;padding:2px 7px;color:var(--white);align-self:flex-start;margin-bottom:2px}
.badge-GK{background:var(--pos-gk)}.badge-DEF{background:var(--pos-def)}.badge-MID{background:var(--pos-mid)}.badge-FWD{background:var(--pos-fwd)}
.card-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);line-height:1.2}
.card-nat{font-size:11px;color:#999;font-weight:500}
.card-peak{font-size:11px;color:var(--gold-dim);font-weight:600;margin-top:2px}
.player-card.hidden{display:none}

/* ── EMPTY STATE ── */
.empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;padding:100px 32px;text-align:center;gap:12px;color:#bbb}
.empty-state.show{display:flex}
.empty-state svg{opacity:.25;width:48px;height:48px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(5,5,5,.82);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(6px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);max-width:800px;width:100%;max-height:90vh;overflow-y:auto;display:grid;grid-template-columns:300px 1fr;position:relative;transform:scale(.97) translateY(12px);transition:transform .2s;box-shadow:0 40px 100px rgba(0,0,0,.4)}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}

.modal-img-col{background:var(--white);border-right:1px solid var(--mist);display:flex;flex-direction:column;min-height:420px}
.modal-gold-bar{height:4px;background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-dim));flex-shrink:0}
.modal-img-col img{width:100%;flex:1;object-fit:contain;object-position:bottom center;display:block;padding:16px 16px 0}

/* Modal placeholder — initials only, no "card coming soon" text */
.modal-ph{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--gold-pale),#e8dfc8);gap:10px;padding:40px;min-height:380px}
.modal-ph-init{font-family:'Playfair Display',serif;font-size:96px;font-weight:900;color:rgba(139,110,42,.18);line-height:1}

.modal-content{padding:40px 36px 36px;display:flex;flex-direction:column}
.modal-pos-badge{display:inline-flex;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;padding:3px 10px;color:var(--white);align-self:flex-start;margin-bottom:14px}
.modal-name{font-family:'Playfair Display',serif;font-size:clamp(24px,3.5vw,36px);font-weight:900;line-height:1.05;color:var(--ink);margin-bottom:4px}
.modal-nat-line{font-size:12px;color:#999;font-weight:500;letter-spacing:1px;margin-bottom:28px}
.modal-rule{width:40px;height:2px;background:var(--gold);margin-bottom:28px}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;margin-bottom:30px}
.stat-label{font-size:9px;letter-spacing:2.5px;color:#bbb;text-transform:uppercase;font-weight:600;margin-bottom:4px}
.stat-value{font-size:14px;font-weight:600;color:var(--ink-soft);line-height:1.3}
.stat-value.accent{color:var(--gold-dim)}
.modal-notes{border-top:1px solid var(--mist);padding-top:20px;margin-top:auto}
.notes-text{font-size:14px;line-height:1.7;color:#666}
.modal-close{position:absolute;top:12px;right:12px;width:34px;height:34px;background:rgba(0,0,0,.06);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#999;transition:background .15s,color .15s;z-index:10}
.modal-close:hover{background:rgba(0,0,0,.1);color:var(--ink)}

@media(max-width:700px){
  .header-inner{padding:0 16px;flex-wrap:wrap;height:auto;padding-top:10px;padding-bottom:10px;gap:10px}
  .hero{padding:52px 20px 44px}
  .grid-wrap{padding:28px 16px 60px}
  .player-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:14px}
  .modal{grid-template-columns:1fr}
  .modal-img-col{min-height:260px;border-right:none;border-bottom:1px solid var(--mist)}
  .sort-group{border-left:none;padding-left:0}
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--off-white)}
::-webkit-scrollbar-thumb{background:var(--mist)}
</style>
</head>

const POS_C={GK:'var(--pos-gk)',DEF:'var(--pos-def)',MID:'var(--pos-mid)',FWD:'var(--pos-fwd)'};
const POS_L={GK:'Goalkeeper',RB:'Right Back',LB:'Left Back',CB:'Centre Back',DM:'Defensive Mid',CM:'Central Mid',AM:'Attacking Mid',RM:'Right Mid',LM:'Left Mid',RW:'Right Wing',LW:'Left Wing',ST:'Striker',FW:'Forward',SS:'Second Striker'};
const POS_ORDER={GK:0,RB:1,LB:2,CB:3,DM:4,CM:5,AM:6,RM:7,LM:8,RW:9,LW:10,ST:11,FW:12};

function grp(pos){
  if(!pos)return'MID';
  const p=pos.toUpperCase();
  if(p==='GK')return'GK';
  if(['RB','LB','CB','CB1','CB2'].includes(p))return'DEF';
  if(['DM','CM','AM','RM','LM'].includes(p))return'MID';
  if(['RW','LW','ST','FW','SS'].includes(p))return'FWD';
  return'MID';
}

function ini(n){return(n||'').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('')}

function lastName(name){const parts=(name||'').split(' ');return parts[parts.length-1].toLowerCase()}

// ── Build cards ─────────────────────────────────────────────
const grid=document.getElementById('player-grid');

// Alphabetical by default (PLAYERS_RAW already sorted by last name from Python)
PLAYERS_RAW.forEach((p,i)=>{
  const g=grp(p.position);
  const card=document.createElement('div');
  card.className='player-card';
  card.dataset.name=(p.name||'').toLowerCase();
  card.dataset.nat=(p.nationality||'').toLowerCase();
  card.dataset.pos=g;
  card.dataset.posraw=(p.position||'').toUpperCase();
  card.dataset.lastname=lastName(p.name);
  card.dataset.i=i;

  const imgH=p.image_file
    ?`<img src="images/${p.image_file}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-placeholder\\'><div class=\\'ph-initials\\'>${ini(p.name)}</div><div class=\\'ph-pos\\'>${p.position||''}</div></div>'">`
    :`<div class="card-placeholder"><div class="ph-initials">${ini(p.name)}</div><div class="ph-pos">${p.position||''}</div></div>`;

  card.innerHTML=`
    <div class="card-stripe stripe-${g}"></div>
    <div class="card-img-wrap">${imgH}</div>
    <div class="card-body">
      <span class="card-pos-badge badge-${g}">${p.position||''}</span>
      <div class="card-name">${p.name}</div>
      <div class="card-nat">${p.nationality||''}</div>
      <div class="card-peak">${p.peak_years||''}</div>
    </div>`;

  card.addEventListener('click',()=>openModal(i));
  grid.appendChild(card);
});

document.getElementById('count-label').textContent=`${PLAYERS_RAW.length} players`;

// ── Filter + sort ────────────────────────────────────────────
let activePos='ALL', searchTerm='', activeSort='alpha';

function applyFilters(){
  const cards=[...document.querySelectorAll('.player-card')];

  // Sort
  if(activeSort==='alpha'){
    cards.sort((a,b)=>a.dataset.lastname.localeCompare(b.dataset.lastname));
  } else {
    const posGrpOrder={GK:0,DEF:1,MID:2,FWD:3};
    cards.sort((a,b)=>{
      const pg=posGrpOrder[a.dataset.pos]??4;
      const qg=posGrpOrder[b.dataset.pos]??4;
      if(pg!==qg)return pg-qg;
      const pp=POS_ORDER[a.dataset.posraw]??99;
      const qp=POS_ORDER[b.dataset.posraw]??99;
      if(pp!==qp)return pp-qp;
      return a.dataset.lastname.localeCompare(b.dataset.lastname);
    });
  }

  // Re-append in sorted order
  cards.forEach(c=>grid.appendChild(c));

  // Filter visibility
  let n=0;
  cards.forEach(c=>{
    const ok=(activePos==='ALL'||c.dataset.pos===activePos)
           &&(!searchTerm||c.dataset.name.includes(searchTerm)||c.dataset.nat.includes(searchTerm));
    c.classList.toggle('hidden',!ok);
    if(ok)n++;
  });

  document.getElementById('empty-state').classList.toggle('show',n===0);
  document.getElementById('count-label').textContent=`${n} player${n!==1?'s':''}`;
}

document.getElementById('search').addEventListener('input',e=>{
  searchTerm=e.target.value.toLowerCase().trim();
  applyFilters();
});

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activePos=btn.dataset.pos;
    applyFilters();
  });
});

document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeSort=btn.dataset.sort;
    applyFilters();
  });
});

// ── Modal ────────────────────────────────────────────────────
function openModal(i){
  const p=PLAYERS_RAW[i];
  const g=grp(p.position);
  const col=document.getElementById('modal-img-col');

  if(p.image_file){
    col.innerHTML=`<div class="modal-gold-bar"></div><img src="images/${p.image_file}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'modal-gold-bar\\'></div><div class=\\'modal-ph\\'><div class=\\'modal-ph-init\\'>${ini(p.name)}</div></div>'">`;
  } else {
    col.innerHTML=`<div class="modal-gold-bar"></div><div class="modal-ph"><div class="modal-ph-init">${ini(p.name)}</div></div>`;
  }

  const badge=document.getElementById('modal-badge');
  badge.textContent=POS_L[p.position]||p.position||'';
  badge.style.background=POS_C[g]||POS_C.MID;
  document.getElementById('modal-name').textContent=p.name;
  document.getElementById('modal-nat').textContent=p.nationality;
  document.getElementById('modal-nat2').textContent=p.nationality;
  document.getElementById('modal-peak').textContent=p.peak_years||'—';
  document.getElementById('modal-club').textContent=p.best_club||'—';
  document.getElementById('modal-pos').textContent=POS_L[p.position]||p.position||'—';
  document.getElementById('modal-notes').textContent=p.notes||'—';

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay')closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
</script>
